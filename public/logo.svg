<svg viewBox="0 0 440 110" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nexxus Engenharia e Consultoria">

  <!-- ── Círculo externo (com gap) ── -->
  <circle cx="55" cy="55" r="48" fill="none" stroke="#2BC4C4" stroke-width="5"
    stroke-dasharray="258 45" stroke-dashoffset="-20" stroke-linecap="round"/>

  <!-- ── N de trás (escuro) ── -->
  <g fill="#0D4E50">
    <!-- vertical esquerda -->
    <rect x="18" y="20" width="13" height="56" rx="1"/>
    <!-- diagonal -->
    <polygon points="18,20 31,20 58,64 58,76 45,76"/>
    <!-- vertical direita -->
    <rect x="45" y="20" width="13" height="56" rx="1"/>
  </g>

  <!-- ── N da frente (cyan, menor, deslocado) ── -->
  <g fill="#2BC4C4">
    <!-- vertical esquerda -->
    <rect x="28" y="28" width="10" height="44" rx="1"/>
    <!-- diagonal -->
    <polygon points="28,28 38,28 62,62 62,72 52,72"/>
    <!-- vertical direita -->
    <rect x="52" y="28" width="10" height="44" rx="1"/>
  </g>

  <!-- ── NEXXUS ── -->
  <text x="120" y="68"
    font-family="'Arial Black', 'Franklin Gothic Heavy', Arial, sans-serif"
    font-weight="900"
    font-size="52"
    letter-spacing="-1"
    fill="#0D4E50">NEXXUS</text>

  <!-- ── ENGENHARIA E CONSULTORIA ── -->
  <text x="122" y="88"
    font-family="Arial, sans-serif"
    font-weight="400"
    font-size="13.5"
    letter-spacing="3.5"
    fill="#2BC4C4">ENGENHARIA E CONSULTORIA</text>

</svg>
